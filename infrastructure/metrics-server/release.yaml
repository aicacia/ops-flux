apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: metrics-server
spec:
  chart:
    spec:
      chart: metrics-server
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
      version: 4.0.x
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  releaseName: metrics-server
  valuesFrom:
    - kind: ConfigMap
      name: metrics-server-values

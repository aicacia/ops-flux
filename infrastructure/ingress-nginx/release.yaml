apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ingress-nginx
spec:
  chart:
    spec:
      chart: ingress-nginx
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      version: 3.29.x
  interval: 1h0m0s
  install:
    remediation:
      retries: 3
  releaseName: ingress-nginx
  valuesFrom:
    - kind: ConfigMap
      name: ingress-nginx-values
